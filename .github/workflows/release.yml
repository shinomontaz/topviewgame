name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  
jobs:
  build:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: game-windows-amd64.exe
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            output: game-linux-amd64
          - os: macos-12
            goos: darwin
            goarch: amd64
            output: game-darwin-amd64
          - os: macos-14
            goos: darwin
            goarch: arm64
            output: game-darwin-arm64
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libxxf86vm-dev libasound2-dev

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23.8'

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -o ${{ matrix.output }}

    - name: Create release package
      run: |
        mkdir -p release
        cp ${{ matrix.output }} release/
        cp -r assets release/
        cp DESCRIPTION.md release/
        cp screen.png release/

    - name: Create archive
      run: |
        if [ "${{ matrix.goos }}" = "windows" ]; then
          cd release && zip -r ../game-${{ matrix.goos }}-${{ matrix.goarch }}.zip . && cd ..
        else
          cd release && tar -czf ../game-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz . && cd ..
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: game-${{ matrix.goos }}-${{ matrix.goarch }}
        path: game-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
          
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/game-windows-amd64/game-windows-amd64.zip
          artifacts/game-linux-amd64/game-linux-amd64.tar.gz
          artifacts/game-darwin-amd64/game-darwin-amd64.tar.gz
          artifacts/game-darwin-arm64/game-darwin-arm64.tar.gz
        body: |
          ## Установка
          
          1. Скачайте архив для вашей ОС
          2. Распакуйте архив
          3. Запустите исполняемый файл
          
          Архив содержит: бинарник + assets + описание
          
          ## Поддерживаемые платформы
          - Windows (amd64) - .zip
          - Linux (amd64) - .tar.gz
          - macOS (Intel и Apple Silicon) - .tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}