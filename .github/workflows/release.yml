name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  
jobs:
  build:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: game-windows-amd64.exe
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            output: game-linux-amd64
          - os: macos-13
            goos: darwin
            goarch: amd64
            output: game-darwin-amd64
          - os: macos-14
            goos: darwin
            goarch: arm64
            output: game-darwin-arm64
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libxxf86vm-dev libasound2-dev

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23.8'

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -o ${{ matrix.output }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output }}
        path: ${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/game-windows-amd64.exe/game-windows-amd64.exe
          artifacts/game-linux-amd64/game-linux-amd64
          artifacts/game-darwin-amd64/game-darwin-amd64
          artifacts/game-darwin-arm64/game-darwin-arm64
          DESCRIPTION.md
          screen.png
        body: |
          ## Установка
          Скачайте бинарник для вашей ОС
          
          ## Поддерживаемые платформы
          - Windows (amd64)
          - Linux (amd64)
          - macOS (Intel и Apple Silicon)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}